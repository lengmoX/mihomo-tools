name: Release Portable Package

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
            rust-target: x86_64-pc-windows-msvc
            exe-name: mihomo-tools.exe
            archive-suffix: windows-x64
          - os: macos-latest
            platform: macos
            arch: arm64
            rust-target: aarch64-apple-darwin
            exe-name: mihomo-tools
            archive-suffix: macos-arm64
          - os: macos-13
            platform: macos
            arch: x64
            rust-target: x86_64-apple-darwin
            exe-name: mihomo-tools
            archive-suffix: macos-x64

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get version
        id: get_version
        shell: bash
        run: |
          ver=$(cat version.txt | tr -d '[:space:]')
          echo "VERSION=$ver" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.rust-target }}

      - name: Download Mihomo Core
        run: pnpm run download-mihomo

      - name: Build Tauri app
        run: pnpm tauri build --no-bundle --target ${{ matrix.rust-target }}

      # ─── Windows packaging ───────────────────────────────────────────────────
      - name: Prepare portable layout (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          $outDir = "mihomo-tools-portable"
          New-Item -ItemType Directory -Force -Path $outDir
          New-Item -ItemType Directory -Force -Path "$outDir/data"
          Copy-Item -Path "src-tauri/target/${{ matrix.rust-target }}/release/mihomo-tools.exe" `
                    -Destination "$outDir/mihomo-tools.exe"
          Copy-Item -Recurse -Path "mihomo" -Destination "$outDir/mihomo"
          $archive = "mihomo-tools-${{ matrix.archive-suffix }}-v$version.zip"
          tar -a -c -f $archive -C $outDir .
          echo "ARCHIVE_NAME=$archive" >> $env:GITHUB_OUTPUT

      # ─── macOS packaging ─────────────────────────────────────────────────────
      - name: Prepare portable layout (macOS)
        if: matrix.platform == 'macos'
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          OUT_DIR="mihomo-tools-portable"
          mkdir -p "$OUT_DIR/data"
          cp "src-tauri/target/${{ matrix.rust-target }}/release/mihomo-tools" \
             "$OUT_DIR/mihomo-tools"
          chmod +x "$OUT_DIR/mihomo-tools"
          cp -r mihomo "$OUT_DIR/mihomo"
          ARCHIVE="mihomo-tools-${{ matrix.archive-suffix }}-v${VERSION}.zip"
          cd "$OUT_DIR"
          zip -r "../$ARCHIVE" .
          cd ..
          echo "ARCHIVE_NAME=$ARCHIVE" >> $GITHUB_OUTPUT

      - name: Set archive name env (Windows)
        if: matrix.platform == 'windows'
        id: archive_win
        shell: pwsh
        run: |
          $version = "${{ steps.get_version.outputs.VERSION }}"
          echo "ARCHIVE_NAME=mihomo-tools-${{ matrix.archive-suffix }}-v$version.zip" >> $env:GITHUB_OUTPUT

      - name: Set archive name env (macOS)
        if: matrix.platform == 'macos'
        id: archive_mac
        shell: bash
        run: |
          VERSION="${{ steps.get_version.outputs.VERSION }}"
          echo "ARCHIVE_NAME=mihomo-tools-${{ matrix.archive-suffix }}-v${VERSION}.zip" >> $GITHUB_OUTPUT

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          files: mihomo-tools-${{ matrix.archive-suffix }}-v${{ steps.get_version.outputs.VERSION }}.zip
          name: Release v${{ steps.get_version.outputs.VERSION }}
          body: |
            Portable release of **mihomo-tools** – a local Mihomo (Clash.Meta) proxy lifecycle manager.

            ## Downloads

            | Platform | Archive |
            |----------|---------|
            | Windows x64 | `mihomo-tools-windows-x64-v${{ steps.get_version.outputs.VERSION }}.zip` |
            | macOS Apple Silicon (arm64) | `mihomo-tools-macos-arm64-v${{ steps.get_version.outputs.VERSION }}.zip` |
            | macOS Intel (x64) | `mihomo-tools-macos-x64-v${{ steps.get_version.outputs.VERSION }}.zip` |

            ## Installation

            1. Download the archive for your platform.
            2. Extract to any directory.
            3. Run `mihomo-tools.exe` (Windows) or `./mihomo-tools` (macOS).

            > The Mihomo core binary is bundled inside the `mihomo/` folder.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
